name: Daily Last.fm Update

on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC — yesterday's scrobbles are fully recorded
  workflow_dispatch:        # allow manual runs from the GitHub UI

permissions:
  contents: write           # needed to push the updated data and plots back

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Fetch new scrobbles and regenerate plots
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          MY_USER: Lib0n
          FRIEND_USER: dymovaleksandra
          MPLBACKEND: Agg   # headless matplotlib — no display needed
        run: uv run python update_data.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scrobble_data.json plot_final.png plot_rates.png index.html
          git diff --staged --quiet || \
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)" && \
            git push
