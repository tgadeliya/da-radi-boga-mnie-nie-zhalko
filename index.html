<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>да ради Бога</title>
<style>
  :root {
    --orange: #FF6600;
    --cream: #FFF8E7;
    --red: #CC0000;
    --ink: #111111;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: Verdana, Arial, sans-serif;
    font-size: 12px;
    color: var(--ink);
    line-height: 1.6;
    padding: 40px 20px;
  }

  .frame {
    max-width: 820px;
    margin: 0 auto;
    background: var(--cream);
    border: 3px solid var(--ink);
    padding: 48px 56px;
    position: relative;
  }

  /* tiny orange corner ticks */
  .frame::before, .frame::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--orange);
  }
  .frame::before { top: -3px; left: -3px; }
  .frame::after  { bottom: -3px; right: -3px; }

  .kicker {
    font-family: "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.15);
  }

  /* --- plot card: retro style with gray header --- */
  .card {
    background: #ffffff;
    border: 1px solid var(--ink);
    margin-bottom: 40px;
  }

  .card-header {
    background: #dddddd;
    border-bottom: 1px solid var(--ink);
    padding: 6px 12px;
    font-weight: bold;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-body {
    padding: 14px;
    text-align: center;
  }

  .card-body img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    border: 1px solid var(--ink);
  }

  /* --- the big verdict block, matching the screenshot --- */
  .verdict {
    text-align: center;
    margin: 40px 0 36px;
    padding: 28px 16px;
    border-top: 3px solid var(--ink);
    border-bottom: 3px solid var(--ink);
    background: var(--cream);
  }

  .verdict-text {
    font-family: Verdana, Arial, sans-serif;
    font-size: 28px;
    font-weight: bold;
    color: var(--ink);
    line-height: 1.4;
    letter-spacing: 0.3px;
  }

  .verdict-text .rate {
    color: var(--red);
    background: #ffffff;
    padding: 0 6px;
    white-space: nowrap;
  }

  .cat-wrap {
    text-align: center;
  }

  .cat-wrap img {
    max-width: 380px;
    width: 100%;
    height: auto;
    border: 1px solid var(--ink);
  }

  .updated {
    margin-top: 32px;
    font-family: "Courier New", monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: right;
  }

  @media (max-width: 640px) {
    body { padding: 20px 12px; }
    .frame { padding: 32px 22px; }
    h1 { font-size: 30px; }
    .verdict-text { font-size: 20px; }
  }
</style>
</head>
<body>
  <div class="frame">

    <h1>да ради Бога</h1>
    <h1>мне не жалко</h1>

    <div class="tagline"></div>

    <div class="card">
      <div class="card-header" align="center">::  SCROBBLE RACE  ::</div>
      <div class="card-body">
        <img src="plot_rates.png" alt="Cumulative scrobble rates with projections">
      </div>
    </div>

    <div class="verdict">
      <div class="verdict-text">
        With the current pace of <span class="rate"><!-- MY_RATE -->104<!-- /MY_RATE -->/day</span>
        and саша scrobbling at <span class="rate"><!-- FRIEND_RATE -->74<!-- /FRIEND_RATE -->/day</span>,<br>
        <!-- VERDICT_MSG -->you'll catch her around October 2027.<!-- /VERDICT_MSG -->
      </div>
    </div>

    <div class="cat-wrap">
      <img src="crying_cat.png" alt="">
    </div>

    <p class="updated">last updated: <!-- UPDATED_DATE -->2026-05-08<!-- /UPDATED_DATE --></p>

  </div>
</body>
</html>
